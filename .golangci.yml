# golangci-lint Konfiguration für ortus
# Dokumentation: https://golangci-lint.run/docs/configuration/

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    # Standard Linters
    - errcheck      # Unbehandelte Fehler finden
    - govet         # Go vet Prüfungen
    - ineffassign   # Ineffektive Zuweisungen
    - staticcheck   # Umfassende statische Analyse
    - unused        # Ungenutzte Variablen/Funktionen

    # Zusätzliche Linters
    - bodyclose     # HTTP Response Body schließen
    - dupl          # Code-Duplikation
    - gocognit      # Kognitive Komplexität
    - goconst       # Wiederholte Strings -> Konstanten
    - gocritic      # Umfassende Code-Kritik
    - gocyclo       # Zyklomatische Komplexität
    - godot         # Kommentar-Formatierung
    - gosec         # Sicherheitsprüfungen
    - misspell      # Rechtschreibfehler
    - nakedret      # Naked Returns vermeiden
    - nilerr        # nil-Error Prüfungen
    - noctx         # HTTP ohne Context
    - prealloc      # Slice-Präallokation
    - revive        # Erweitertes golint
    - sqlclosecheck # SQL Rows/Stmt schließen
    - unconvert     # Unnötige Typ-Konvertierungen
    - unparam       # Ungenutzte Parameter
    - whitespace    # Leerzeichen-Probleme

    # Architektur-Harness (Drift-Schutz, siehe doc/ARCHITECTURE_PLAN.md)
    - depguard        # Hexagonale Import-Grenzen erzwingen
    - gomodguard_v2   # Modul-Blocklist (Dependency-Bloat verhindern)

  settings:
    # Hexagonale Import-Grenzen. Erlaubte Richtung:
    #   domain → (nichts Internes)
    #   ports → domain
    #   application → domain, ports
    #   adapters → domain, ports        (NICHT application, NICHT Geschwister-Adapter)
    #   app/cmd → alles (Composition Root)
    # `files` matcht Dateipfade; deny listet verbotene Importe (einwärts/seitwärts).
    depguard:
      rules:
        domain:
          files: ["**/internal/domain/**"]
          deny:
            - { pkg: github.com/jobrunner/ortus/internal/application, desc: "domain ist der innerste Kern und darf nichts importieren" }
            - { pkg: github.com/jobrunner/ortus/internal/ports, desc: "domain darf ports nicht kennen" }
            - { pkg: github.com/jobrunner/ortus/internal/adapters, desc: "domain darf adapters nicht kennen" }
            - { pkg: github.com/jobrunner/ortus/internal/app, desc: "domain darf den Composition Root nicht kennen" }
            - { pkg: github.com/jobrunner/ortus/internal/config, desc: "domain bleibt konfigurationsfrei" }
        ports:
          files: ["**/internal/ports/**"]
          deny:
            - { pkg: github.com/jobrunner/ortus/internal/application, desc: "ports definieren nur Verträge über domain" }
            - { pkg: github.com/jobrunner/ortus/internal/adapters, desc: "ports dürfen adapters nicht kennen" }
            - { pkg: github.com/jobrunner/ortus/internal/app }
            - { pkg: github.com/jobrunner/ortus/internal/config }
        application:
          files: ["**/internal/application/**"]
          deny:
            - { pkg: github.com/jobrunner/ortus/internal/adapters, desc: "der Core spricht Adapter nur über ports an" }
            - { pkg: github.com/jobrunner/ortus/internal/app, desc: "der Core kennt den Composition Root nicht" }
        adapters:
          files: ["**/internal/adapters/**"]
          deny:
            - { pkg: github.com/jobrunner/ortus/internal/application, desc: "Adapter sprechen den Core nur über ports an" }
            - { pkg: github.com/jobrunner/ortus/internal/app, desc: "Adapter kennen den Composition Root nicht" }
            - { pkg: github.com/jobrunner/ortus/internal/adapters, desc: "kein Adapter→Adapter-Import (Querkopplung); gemeinsame Logik gehört in domain/ports" }

    gomodguard_v2:
      blocked:
        # gocog zieht mongo-driver/bson transitiv ein (ADR-0013). Transitiv
        # akzeptiert, aber NIE direkt im First-Party-Code importieren.
        - module: go.mongodb.org/mongo-driver
          reason: "Nur transitive Abhängigkeit über gocog (ADR-0013); nicht direkt verwenden."

    gocyclo:
      min-complexity: 16

    gocognit:
      min-complexity: 20

    dupl:
      threshold: 100

    goconst:
      min-len: 3
      min-occurrences: 3

    misspell:
      locale: US

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - whyNoLint
        - hugeParam          # Too strict for function parameters
        - rangeValCopy       # Premature optimization
        - paramTypeCombine   # Style preference
        - octalLiteral       # Style preference (0750 vs 0o750)
        - httpNoBody         # Minor style issue

    gosec:
      excludes:
        - G104  # Audit errors not checked

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: var-declaration
        - name: var-naming

  exclusions:
    rules:
      # Test-Dateien: weniger strikt
      - path: _test\.go
        linters:
          - dupl
          - gosec
          - gocyclo
          - gocognit
          - goconst   # Tests legitimately repeat literals
          - noctx     # httptest.NewRequest is the conventional helper in tests
          - depguard  # Tests sind der "Test-Composition-Root" und dürfen über
                      # Schichten hinweg echte Implementierungen verdrahten
                      # (Integrations-/Coverage-Tests). Produktionscode bleibt streng.


      # main.go darf globale Variablen haben
      - path: main\.go
        text: "don't use globals"

      # Allow http package name in adapters (intentional)
      - path: internal/adapters/http/
        text: "avoid package names that conflict"

      # HTTP adapter freely uses string literals as slog/JSON keys ("status",
      # "path", "name", ...). Promoting these to constants adds clutter
      # without semantic value — slog APIs take strings by design.
      - path: internal/adapters/http/
        linters:
          - goconst

output:
  show-stats: true
