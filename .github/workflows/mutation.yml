# Mutation testing with gremlins — a HARD GATE on the pure-logic core.
# Coverage tells you a line executed; mutation testing tells you a test would
# actually CATCH a bug in it. It runs the suite per mutant but the core packages
# are fast (~100 s total), so it gates every PR that touches them AND runs weekly
# (on the default branch). The job FAILS when a package's mutation score is below its
# ratcheted baseline (per-package thresholds below; raise them as tests improve).
name: Mutation Testing

on:
  pull_request:
    paths:
      - 'internal/domain/**'
      - 'internal/application/**'
      - '.github/workflows/mutation.yml'
      - '.gremlins.yaml'
  schedule:
    - cron: '0 3 * * 1' # Monday 03:00 UTC
  workflow_dispatch:

env:
  GO_VERSION: '1.26.5'
  GREMLINS_VERSION: 'v0.5.1'

permissions:
  contents: read

jobs:
  mutation:
    name: gremlins (core logic)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      # The module links cgo SpatiaLite; install it so the test binaries build.
      - name: Install SpatiaLite
        run: |
          sudo apt-get update && sudo apt-get install -y libsqlite3-mod-spatialite
          # `|| true`: with Actions' default `-o pipefail`, a no-match grep would
          # abort the step before the guard below could print a clear message.
          lib=$(dpkg -L libsqlite3-mod-spatialite | grep -m1 'mod_spatialite\.so' || true)
          if [ -z "$lib" ]; then echo "mod_spatialite.so not found" >&2; exit 1; fi
          echo "SPATIALITE_LIBRARY_PATH=$lib" >> "$GITHUB_ENV"

      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@${{ env.GREMLINS_VERSION }}

      # Hard gate: each package must meet its per-package efficacy + mutator-
      # coverage baseline, or gremlins exits non-zero and the job fails. Both
      # packages always run (so the report shows both) before the job fails.
      - name: Run mutation testing
        run: |
          set -uo pipefail
          fail=0
          run_pkg() {
            local pkg="$1" eff="$2" mcov="$3"
            echo "===== gremlins: $pkg (min efficacy ${eff}%, min mutator-coverage ${mcov}%) =====" | tee -a mutation.log
            if ! gremlins unleash --threshold-efficacy "$eff" --threshold-mcover "$mcov" "$pkg" 2>&1 | tee -a mutation.log; then
              echo "::error::Mutation gate FAILED for $pkg — score below baseline (efficacy ${eff}% / mcover ${mcov}%). Add tests that kill the LIVED mutants in mutation.log, or (last resort) adjust the baseline in .github/workflows/mutation.yml (and make mutation) with justification."
              fail=1
            fi
          }
          # Baselines (ratchet up as tests improve). Last measured: domain 95/100,
          # application 69/90 — thresholds sit a few points below to absorb the
          # small run-to-run variance from timed-out mutants.
          run_pkg ./internal/domain 90 95
          run_pkg ./internal/application 65 88
          exit "$fail"

      - name: Summary
        if: always()
        run: |
          {
            echo '### Mutation testing (gremlins) — internal/domain, internal/application'
            echo '```'
            grep -iE 'gremlins:|Killed:|Test efficacy:|Mutator coverage:|LIVED|NOT COVERED' mutation.log 2>/dev/null | tail -60 || echo "no summary captured"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: mutation.log
          if-no-files-found: ignore
