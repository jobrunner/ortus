# Docker Release Pipeline für ortus
# Builds and pushes multi-arch Docker images to GitHub Container Registry
name: Docker Release

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'doc/**'
      - '.claude/**'
  workflow_dispatch:
    inputs:
      force_push:
        description: 'Force push even if no changes'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Default is least-privilege; jobs add what they specifically need
# (packages:write for image push, security-events:write for SARIF
# upload, contents:write for the GitHub release).
permissions:
  contents: read

jobs:
  # =============================================================================
  # Read Version
  # =============================================================================
  version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      major: ${{ steps.version.outputs.major }}
      minor: ${{ steps.version.outputs.minor }}
    steps:
      - uses: actions/checkout@v7

      - name: Read VERSION file
        id: version
        run: |
          # First whitespace-delimited token of line 1 — ignores the
          # release-please marker comment (`0.13.0 # x-release-please-version`).
          VERSION=$(head -n1 VERSION | awk '{print $1}')
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT

          echo "Version: $VERSION"
          echo "Major: $MAJOR"
          echo "Minor: $MINOR"

  # =============================================================================
  # Build and Push Docker Images - Alpine (default)
  # =============================================================================
  docker-alpine:
    name: Build Alpine Image
    runs-on: ubuntu-latest
    needs: [version]
    permissions:
      contents: read
      packages: write    # push image to ghcr.io
      id-token: write    # cosign keyless signing via OIDC
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=${{ needs.version.outputs.version }}-alpine
            type=raw,value=${{ needs.version.outputs.minor }}
            type=raw,value=${{ needs.version.outputs.minor }}-alpine
            type=raw,value=${{ needs.version.outputs.major }}
            type=raw,value=${{ needs.version.outputs.major }}-alpine
            type=raw,value=latest
            type=raw,value=alpine
            type=sha,prefix=

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Supply-chain attestations baked into the image manifest:
          provenance: mode=max # SLSA build provenance
          sbom: true           # SPDX SBOM
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Sign image (cosign keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

  # =============================================================================
  # Build and Push Docker Images - Ubuntu
  # =============================================================================
  docker-ubuntu:
    name: Build Ubuntu Image
    runs-on: ubuntu-latest
    needs: [version]
    permissions:
      contents: read
      packages: write
      id-token: write    # cosign keyless signing via OIDC
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}-ubuntu
            type=raw,value=${{ needs.version.outputs.minor }}-ubuntu
            type=raw,value=${{ needs.version.outputs.major }}-ubuntu
            type=raw,value=ubuntu

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ubuntu
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max # SLSA build provenance
          sbom: true           # SPDX SBOM
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Sign image (cosign keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

  # =============================================================================
  # Security Scan Published Images
  # =============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [docker-alpine, version]
    permissions:
      contents: read
      security-events: write   # upload Trivy SARIF
    steps:
      - uses: actions/checkout@v7

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # =============================================================================
  # Create GitHub Release (optional, on tag)
  # =============================================================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [docker-alpine, docker-ubuntu, version]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Check if release exists
        id: check
        run: |
          if gh release view "v${{ needs.version.outputs.version }}" &> /dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract changelog for version
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          # Extract the body of this version's section: lines AFTER the
          # `## [VERSION]` heading up to (but not including) the NEXT `## [`
          # heading. (The old `/start/,/end/` range used `/## \[/` as the end
          # pattern, which matched the start heading itself, collapsing the
          # range to one line and yielding empty notes.)
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md | head -100)
          if [[ -z "$NOTES" ]]; then
            NOTES="Release v$VERSION"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Release v${{ needs.version.outputs.version }}
          body: |
            ## Docker Images

            ```bash
            # Alpine (default, recommended)
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}

            # Ubuntu
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}-ubuntu
            ```

            ## Supply chain

            Images are signed (cosign keyless) and carry an SLSA provenance and
            SPDX SBOM attestation.

            ```bash
            IMG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}

            # Verify the signature
            cosign verify "$IMG" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity-regexp '^https://github.com/${{ github.repository }}/.github/workflows/docker-release.yml@'

            # Inspect SBOM / provenance attestations
            cosign download sbom "$IMG"
            docker buildx imagetools inspect "$IMG" --format '{{ json .Provenance }}'
            ```

            ## Changelog

            ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(needs.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
