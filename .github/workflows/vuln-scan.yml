# Weekly vulnerability scan on master. The regular CI Security job runs
# on every push and PR; this job runs on a schedule so newly-disclosed
# CVEs in the Go stdlib (which are continuously published) become visible
# even when there is no PR activity to trigger them.
#
# Outcome handling distinguishes three cases:
#   - findings (govulncheck exit 3, "X vulnerabilities" in JSON)
#       → open / comment on a `security`-labelled GitHub issue, fail the job
#   - clean (exit 0)
#       → succeed silently
#   - scan error (build failed, network issue, exit other than 0/3)
#       → fail the job WITHOUT opening an issue, so we don't spam "new CVEs"
#         when really the scan was broken
name: Vuln Scan

on:
  schedule:
    # Monday 06:00 UTC, after the Go security team's typical Tuesday
    # release cadence in the previous week.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write   # to open / comment on the security issue

jobs:
  scan:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Pull the toolchain version from go.mod so we always scan
          # against what the build actually uses.
          go-version-file: go.mod

      - name: Run govulncheck (JSON)
        id: vuln
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # -json emits structured output even on findings. Exit codes:
          #   0 — no vulnerabilities
          #   3 — vulnerabilities found
          #   other — scan failed (build error, network, etc.)
          set +e
          govulncheck -json ./... > vuln-report.json 2> vuln-stderr.txt
          rc=$?
          set -e
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          # Also keep a human-readable text report for the issue body.
          govulncheck ./... > vuln-report.txt 2>&1 || true

      - name: Ensure `security` label exists
        if: steps.vuln.outputs.rc == '3'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Idempotent: --force overwrites if it exists, creates otherwise.
          gh label create security \
            --color D93F0B \
            --description "Security vulnerability or scan finding" \
            --force

      - name: Open or update security issue
        if: steps.vuln.outputs.rc == '3'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          title="Weekly vuln scan: new CVEs detected"
          existing=$(gh issue list \
            --label security \
            --state open \
            --search "$title in:title" \
            --json number --jq '.[0].number // ""')

          body=$(printf 'govulncheck reports vulnerabilities on master.\n\n```\n%s\n```\n\n## Fix\n\nUsually the right action is to bump the `toolchain` directive in `go.mod` to a Go patch version that fixes the listed CVEs, then update `GO_VERSION` in `.github/workflows/{ci,release}.yml` to match. Dependabot may already have an open PR doing this.\n' "$(cat vuln-report.txt)")

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create \
              --title "$title" \
              --label security \
              --body "$body"
          fi

      - name: Fail with scan-error context
        if: steps.vuln.outputs.rc != '0' && steps.vuln.outputs.rc != '3'
        run: |
          echo "::error::govulncheck exited with $(cat <<< '${{ steps.vuln.outputs.rc }}') — not a CVE finding, likely a scan error. See log for details."
          cat vuln-stderr.txt
          exit 1

      - name: Fail job if vulnerabilities found
        if: steps.vuln.outputs.rc == '3'
        run: exit 1
