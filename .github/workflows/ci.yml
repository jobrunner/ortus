# CI Pipeline für ortus
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: '1.26.4'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Least-privilege default. Individual jobs override (e.g. docker-security
# adds security-events: write for SARIF upload) but everyone starts with
# read-only repo access. Without this, GITHUB_TOKEN inherits the
# repo-wide default which is broader than necessary for most jobs.
permissions:
  contents: read

jobs:
  # =============================================================================
  # Version Validation
  # =============================================================================
  version:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Full history for diff comparison

      - name: Validate VERSION file
        id: version
        run: |
          if [[ ! -f VERSION ]]; then
            echo "❌ VERSION file not found"
            exit 1
          fi

          VERSION=$(head -n1 VERSION | awk '{print $1}')
          SEMVER_REGEX='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*))*))?(\+([0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*))?$'

          if [[ ! "$VERSION" =~ $SEMVER_REGEX ]]; then
            echo "❌ Invalid version format: '$VERSION'"
            echo "   Expected semver format: MAJOR.MINOR.PATCH"
            exit 1
          fi

          echo "✅ Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check CHANGELOG entry
        run: |
          VERSION=$(head -n1 VERSION | awk '{print $1}')
          if ! grep -q "\[$VERSION\]" CHANGELOG.md && ! grep -q "\[Unreleased\]" CHANGELOG.md; then
            echo "⚠️  Version $VERSION not found in CHANGELOG.md"
            echo "   Make sure to document changes before release."
          fi

      # Versioning + CHANGELOG are owned by release-please (release-please.yml):
      # feature PRs no longer hand-bump VERSION/CHANGELOG — they just use
      # Conventional Commits, and release-please opens a release PR that bumps
      # VERSION and cuts the CHANGELOG. The old "require a manual bump on every
      # code PR" gate was removed when release-please was adopted.

  # =============================================================================
  # Go Linting
  # =============================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

  # =============================================================================
  # Go Tests
  # =============================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      # SpatiaLite is required for the GeoPackage integration tests; without it
      # they skip and the core query path is left unexercised (and uncovered).
      # SPATIALITE_LIBRARY_PATH must point at the exact .so: the driver loads
      # its candidate paths in order and aborts on the first that doesn't exist
      # (the Alpine path leads the list), so the env var is the reliable way in.
      - name: Install SpatiaLite
        run: |
          sudo apt-get update && sudo apt-get install -y libsqlite3-mod-spatialite
          lib=$(dpkg -L libsqlite3-mod-spatialite | grep -m1 'mod_spatialite\.so')
          echo "Found SpatiaLite at: $lib"
          echo "SPATIALITE_LIBRARY_PATH=$lib" >> "$GITHUB_ENV"

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          file: ./coverage.out
          fail_ci_if_error: false

      - name: Coverage floors (ratchet)
        run: ./scripts/coverage-gate.sh coverage.out

  # =============================================================================
  # Benchmarks. Running them is a hard gate (they must compile + execute — no
  # bit-rot). Timing-regression detection is intentionally NOT a hard gate:
  # shared CI runners are too noisy for a reliable per-PR threshold. Instead we
  # post a benchstat PR-vs-base delta (same runner cancels machine variance) to
  # the job summary for human review. See docs/explanation/technical-debt.md.
  # =============================================================================
  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install SpatiaLite
        run: |
          sudo apt-get update && sudo apt-get install -y libsqlite3-mod-spatialite
          lib=$(dpkg -L libsqlite3-mod-spatialite | grep -m1 'mod_spatialite\.so')
          if [ -z "$lib" ]; then echo "mod_spatialite.so not found after install" >&2; exit 1; fi
          echo "Found SpatiaLite at: $lib"
          echo "SPATIALITE_LIBRARY_PATH=$lib" >> "$GITHUB_ENV"

      - name: Benchmarks (this branch)
        run: make bench BENCHCOUNT=6 | tee new.txt

      - name: Benchmarks (base) + benchstat delta
        if: github.event_name == 'pull_request'
        run: |
          go install golang.org/x/perf/cmd/benchstat@latest
          # new.txt/old.txt are untracked, so they survive the checkouts below.
          git checkout --quiet "${{ github.event.pull_request.base.sha }}"
          make bench BENCHCOUNT=6 > old.txt 2>/dev/null || echo "base: no comparable benchmarks" > old.txt
          git checkout --quiet -
          {
            echo '### Benchmark delta (base → PR)'
            echo '```'
            benchstat old.txt new.txt 2>&1 || echo "no comparable results (e.g. the PR that first adds these benchmarks)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # =============================================================================
  # Security Scanning (Go)
  # =============================================================================
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # =============================================================================
  # License compliance. Fails if a shipped (cmd/ortus) dependency carries a
  # license outside the permissive allowlist — same spirit as gomodguard, but
  # for licenses. First-party packages are ignored (the repo isn't classified).
  # =============================================================================
  licenses:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check dependency licenses
        run: |
          go install github.com/google/go-licenses@latest
          make licenses

  # =============================================================================
  # Docs. Builds the Diátaxis site with `mkdocs build --strict`, which fails on
  # broken internal links, missing nav entries, or unresolved references.
  # =============================================================================
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build docs (strict)
        run: uvx --with mkdocs-material mkdocs build --strict

  # =============================================================================
  # Secret scanning. gitleaks-action@v2 scans the git history of the event's
  # commit range (the PR commits on a PR, github.event.before..after on push) —
  # so a secret added and removed within the range is still caught. Config +
  # allowlist live in .gitleaks.toml. Free for this personal repo (no license).
  # =============================================================================
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # gitleaks needs history to diff the scanned commit range

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =============================================================================
  # Architecture & debt harness — drift + technical-debt gates.
  # The hexagonal import-boundary rules (depguard), module blocklist
  # (gomodguard) and nolintlint run inside the Lint job (golangci-lint ./...).
  # This job adds the go.mod/go.sum tidiness gate plus the debt ratchet
  # (suppression budget, debt markers, storage-filter drift). See docs/explanation/technical-debt.md.
  # =============================================================================
  architecture:
    name: Architecture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: go.mod tidiness
        run: go mod tidy -diff

      - name: Debt ratchet (suppressions, markers, storage filters)
        run: ./scripts/debt-guard.sh

  # =============================================================================
  # Go Build
  # =============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, version]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: go build -v ./cmd/ortus

      - name: Verify binary
        run: ./ortus version

  # =============================================================================
  # Dockerfile Linting
  # =============================================================================
  docker-lint:
    name: Docker Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Lint Dockerfile.alpine
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile.alpine
          failure-threshold: error

      - name: Lint Dockerfile.ubuntu
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile.ubuntu
          failure-threshold: error

  # =============================================================================
  # GitHub Actions Workflow Linting
  # =============================================================================
  actions-lint:
    name: Actions Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # actionlint catches workflow-level bugs (typos, invalid expressions,
      # bad shell scripts, action input validation) AND a handful of
      # security issues like script-injection via untrusted github.event
      # fields. Cheap to run on every PR; downloads a ~5MB static binary.
      #
      # shellcheck integration is filtered to severity=error so style
      # suggestions like SC2086 ("quote to prevent word splitting") don't
      # gate every PR. Real bugs and security issues are still caught.
      - name: Run actionlint
        run: |
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash \
            | bash -s -- 1.7.12
          ./actionlint -color -shellcheck="-S error"

  # =============================================================================
  # Docker Build (without push) - Multi-arch
  # =============================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [docker-lint, build, version]
    strategy:
      matrix:
        dockerfile: [Dockerfile, Dockerfile.alpine, Dockerfile.ubuntu]
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract variant name
        id: variant
        run: |
          DOCKERFILE="${{ matrix.dockerfile }}"
          if [[ "$DOCKERFILE" == "Dockerfile" ]]; then
            echo "variant=alpine" >> $GITHUB_OUTPUT
          else
            VARIANT="${DOCKERFILE#Dockerfile.}"
            echo "variant=$VARIANT" >> $GITHUB_OUTPUT
          fi

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}-${{ steps.variant.outputs.variant }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =============================================================================
  # Docker Security Scan
  # =============================================================================
  docker-security:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    needs: [docker-lint]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ortus:scan

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'ortus:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
