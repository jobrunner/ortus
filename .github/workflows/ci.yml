# CI Pipeline für ortus
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: '1.26.4'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Least-privilege default. Individual jobs override (e.g. docker-security
# adds security-events: write for SARIF upload) but everyone starts with
# read-only repo access. Without this, GITHUB_TOKEN inherits the
# repo-wide default which is broader than necessary for most jobs.
permissions:
  contents: read

jobs:
  # =============================================================================
  # Version Validation
  # =============================================================================
  version:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Full history for diff comparison

      - name: Validate VERSION file
        id: version
        run: |
          if [[ ! -f VERSION ]]; then
            echo "❌ VERSION file not found"
            exit 1
          fi

          VERSION=$(head -n1 VERSION | awk '{print $1}')
          SEMVER_REGEX='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*))*))?(\+([0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*))?$'

          if [[ ! "$VERSION" =~ $SEMVER_REGEX ]]; then
            echo "❌ Invalid version format: '$VERSION'"
            echo "   Expected semver format: MAJOR.MINOR.PATCH"
            exit 1
          fi

          echo "✅ Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check CHANGELOG entry
        run: |
          VERSION=$(head -n1 VERSION | awk '{print $1}')
          if ! grep -q "\[$VERSION\]" CHANGELOG.md && ! grep -q "\[Unreleased\]" CHANGELOG.md; then
            echo "⚠️  Version $VERSION not found in CHANGELOG.md"
            echo "   Make sure to document changes before release."
          fi

      # Versioning + CHANGELOG are owned by release-please (release-please.yml):
      # feature PRs no longer hand-bump VERSION/CHANGELOG — they just use
      # Conventional Commits, and release-please opens a release PR that bumps
      # VERSION and cuts the CHANGELOG. The old "require a manual bump on every
      # code PR" gate was removed when release-please was adopted.

  # =============================================================================
  # Go Linting
  # =============================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

  # =============================================================================
  # Go Tests
  # =============================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          file: ./coverage.out
          fail_ci_if_error: false

  # =============================================================================
  # Security Scanning (Go)
  # =============================================================================
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # =============================================================================
  # Go Build
  # =============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, version]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: go build -v ./cmd/ortus

      - name: Verify binary
        run: ./ortus version

  # =============================================================================
  # Dockerfile Linting
  # =============================================================================
  docker-lint:
    name: Docker Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Lint Dockerfile.alpine
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile.alpine
          failure-threshold: error

      - name: Lint Dockerfile.ubuntu
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile.ubuntu
          failure-threshold: error

  # =============================================================================
  # GitHub Actions Workflow Linting
  # =============================================================================
  actions-lint:
    name: Actions Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # actionlint catches workflow-level bugs (typos, invalid expressions,
      # bad shell scripts, action input validation) AND a handful of
      # security issues like script-injection via untrusted github.event
      # fields. Cheap to run on every PR; downloads a ~5MB static binary.
      #
      # shellcheck integration is filtered to severity=error so style
      # suggestions like SC2086 ("quote to prevent word splitting") don't
      # gate every PR. Real bugs and security issues are still caught.
      - name: Run actionlint
        run: |
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash \
            | bash -s -- 1.7.12
          ./actionlint -color -shellcheck="-S error"

  # =============================================================================
  # Docker Build (without push) - Multi-arch
  # =============================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [docker-lint, build, version]
    strategy:
      matrix:
        dockerfile: [Dockerfile, Dockerfile.alpine, Dockerfile.ubuntu]
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract variant name
        id: variant
        run: |
          DOCKERFILE="${{ matrix.dockerfile }}"
          if [[ "$DOCKERFILE" == "Dockerfile" ]]; then
            echo "variant=alpine" >> $GITHUB_OUTPUT
          else
            VARIANT="${DOCKERFILE#Dockerfile.}"
            echo "variant=$VARIANT" >> $GITHUB_OUTPUT
          fi

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}-${{ steps.variant.outputs.variant }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =============================================================================
  # Docker Security Scan
  # =============================================================================
  docker-security:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    needs: [docker-lint]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ortus:scan

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'ortus:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
