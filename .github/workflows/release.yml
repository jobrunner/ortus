# Release Pipeline für ortus
name: Release

on:
  push:
    tags:
      - 'v*'

# Least-privilege default. The release job overrides contents: write
# since it pushes the GitHub release artifact.
permissions:
  contents: read

env:
  GO_VERSION: '1.26.4'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # Release builds should not consume the shared module cache —
          # a poisoned cache from an earlier job could be embedded into
          # the released artifact. setup-go enables caching by default;
          # disable it for the release path. See zizmor cache-poisoning.
          cache: false

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
