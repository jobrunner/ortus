# Release automation via release-please (+ inline goreleaser).
#
# On every push to master, release-please inspects the Conventional Commits
# since the last release and maintains a "release PR" that:
#   - bumps the VERSION file (generic updater, x-release-please-version marker),
#   - cuts CHANGELOG.md ([Unreleased]-style accumulation → a versioned section),
#   - and, when merged, tags vX.Y.Z + creates the GitHub Release.
#
# When that release PR merges (release_created == true), the goreleaser job in
# THIS workflow builds the binaries and attaches them to the release-please
# release. goreleaser runs in `append` mode (.goreleaser.yml) so it uploads
# artifacts to the existing release without recreating it or its notes.
#
# Why inline (not the old tag-triggered release.yml): tags pushed with
# GITHUB_TOKEN do NOT trigger other workflows (loop prevention), so a separate
# `on: push tags` workflow would never fire from a release-please tag. Running
# goreleaser in the same workflow run avoids needing a PAT.
name: release-please

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  GO_VERSION: '1.26.4'

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the release PR, tag, and GitHub Release
      pull-requests: write   # open/maintain the release PR
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  # Build + upload binaries only when a release was actually cut.
  goreleaser:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # upload artifacts to the GitHub Release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Build exactly the tagged commit release-please just created.
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          # Don't reuse the shared module cache for release builds — a poisoned
          # cache could be embedded into the artifact. See zizmor cache-poisoning.
          cache: false

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
