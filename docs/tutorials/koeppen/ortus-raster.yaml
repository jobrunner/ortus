schema_version: 1
id: koeppen-geiger-1980-2016
name: "Köppen-Geiger climate classification 1980–2016 (Beck et al. 2018, V1)"
description: "Köppen-Geiger climate classification at ~1 km, computed over the 1980–2016 reference period (Beck et al. 2018, V1). 'Present-day' here means this fixed reference period, not the current year."
license:
  name: "CC-BY-4.0"
  attribution: "Beck et al. (2018), Scientific Data 5:180214"
  url: "https://www.gloh2o.org/koppen/"
crs: EPSG:4326
layers:
  - id: classification
    file: koeppen.cog.tif
    band: 1
    nodata: 0
    sampling: nearest
    mapping:
      1:  { code: "Af", description: "Tropical, rainforest", group: "Tropical", color: "#0000FF" }
