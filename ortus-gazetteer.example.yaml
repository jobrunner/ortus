# ortus gazetteer manifest — maps the osm-admin-places.gpkg layers/columns to
# ortus's gazetteer roles. Verified against the rebuilt file (2026-07).
places:
  layer: places
  name_column: name                 # romanized (always-Latin) display name
  name_native_column: name_native   # original-script name (same column on both layers)
  name_source_column: name_source   # romanization/provenance code (same on both layers)
  rank_column: place                # village | town | city
  admin_fk: admin_id                # → admin_levels.fid of the most-local containing unit
  country_column: country_iso
  # Prominence signals for bearing anchor salience (CompositeSalience). Optional: a package
  # without these columns falls back to rank-only RankedSalience.
  population_column: population      # OSM population (integer), GeoNames-backfilled tail; NULL if unknown
  capital_column: capital           # OSM capital= rank (2=country … 8=municipality); admin rank of the seat
  notability_column: wikidata       # OSM wikidata QID; presence is a notability proxy
admin:
  layer: admin_levels
  level_column: admin_level
  name_column: name
  parent_fk: parent_id
  country_column: country_iso
  bearing_constraint_tier: state

# Dataset-wide license/attribution for the gazetteer data. Optional but
# recommended — ortus echoes it in the gazetteer response (REST + MCP) so a
# client has the attribution it must display in the same call. The osm-admin-places
# dataset is a composite: OSM (ODbL) + GeoNames (CC BY 4.0) + Natural Earth (public
# domain) + NGA GNS (public domain).
license:
  name: "ODbL-1.0"
  url: "https://opendatacommons.org/licenses/odbl/1-0/"
  attribution: "© OpenStreetMap contributors (ODbL 1.0); Natural Earth (public domain); GeoNames (CC BY 4.0); NGA GNS (public domain)"
