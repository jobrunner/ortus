# gitleaks config for ortus. Starts from the built-in ruleset and allowlists
# paths that legitimately contain secret-shaped placeholders (docs, the example
# config, and test fixtures) so they don't produce false positives. Real
# secrets in real source still fail the CI Secret Scan job.
title = "ortus gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Docs, example config, and test fixtures hold placeholder/secret-shaped strings."
paths = [
  '''config\.yaml\.example''',
  '''.*_test\.go''',
  '''README\.md''',
  '''CHANGELOG\.md''',
  '''doc/.*\.md''',
]
