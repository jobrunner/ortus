global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ortus'
    static_configs:
      # ortus serves /metrics on its dedicated metrics port (metrics.port,
      # default 9090) — NOT on the API port 8080. Reachable container-to-
      # container over the compose network without publishing it to the host.
      - targets: ['ortus:9090']
    metrics_path: /metrics
