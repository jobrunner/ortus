version: 1
equivalent_levels:
    borough:
        description: Sub-municipal borough / urban district
    country:
        description: Sovereign state (admin_level 2)
    county:
        description: County or district tier
    district:
        description: District / subdistrict
    municipality:
        description: Municipality / commune (basic local government unit)
    other:
        description: Does not map to a standard tier (see notes)
    parish:
        description: Civil parish
    province:
        description: Province / department tier
    region:
        description: Administrative region / mid-tier grouping (e.g. Regierungsbezirk, NUTS region)
    state:
        description: First-order subdivision (Land, oblast, comunidad autónoma, ...)
    submunicipality:
        description: Other sub-municipal unit (quarter, ward, locality)
