version: 1
equivalent_levels:
    borough:
        description: Sub-municipal borough / urban district
    country:
        description: Sovereign state (admin_level 2)
    county:
        description: County or district tier
    district:
        description: District / subdistrict
    municipality:
        description: Municipality / commune (basic local government unit)
    other:
        description: Does not map to a standard tier (see notes)
    parish:
        description: Civil parish
    province:
        description: Province / department tier
    region:
        description: Administrative region / mid-tier grouping (e.g. Regierungsbezirk, NUTS region)
    state:
        description: First-order subdivision (Land, oblast, comunidad autónoma, ...)
    submunicipality:
        description: Other sub-municipal unit (quarter, ward, locality)
countries:
    AE:
        name: "United Arab Emirates"
        partial_coverage: false
        levels:
            2:
                name: "United Arab Emirates"
                equivalent: country
                present_in_data: true
                source: "OSM Wiki Template:Admin level (unitedarab:value, marked 'proposed'); OSM data (AE L2; 1 feature: الإمارات العربية المتحدة)"
            4:
                name: "Emirates (إمارة)"
                equivalent: state
                present_in_data: true
                source: "OSM Wiki Template:Admin level (unitedarab:n4 = 'Emirates (إمارة)'); OSM data (AE L4; 8 features e.g. أبو ظبي, دبي, الشارقة, إمارة عجمان, رأس الخيمة, الفجيرة, أم القيوين, محافظة البريمي)"
            5:
                name: "Capital Abu Dhabi (أبو ظبي)"
                equivalent: region
                present_in_data: true
                source: "OSM Wiki Template:Admin level (unitedarab:n5 = 'Capital Abu Dhabi (أبو ظبي)'); OSM data (AE L5; 1 feature: أبو ظبي)"
            6:
                name: "Region / District (منطقة, ولاية)"
                equivalent: district
                present_in_data: true
                source: "OSM data (AE L6; 5 features e.g. منطقة الظفرة, العين, ولاية مدحاء, ولاية بخا) — wiki marks n6 as n/a, so name derived from data"
            7:
                name: "Locality / Sub-district (in use, fixme)"
                equivalent: other
                present_in_data: true
                source: "OSM Wiki Template:Admin level (unitedarab:n7 = 'in use, fixme'); OSM data (AE L7; 5 features e.g. حفير, سيح الدحل, Al O'shoosh, Saih Shua'Alah, Al Fagaa')"
            8:
                name: "Municipalities"
                equivalent: municipality
                present_in_data: true
                source: "OSM Wiki Template:Admin level (unitedarab:n8 = 'Municipalities'); OSM data (AE L8; 372 features e.g. خورفكان, Kalba كلباء, الحمرية)"
            10:
                name: "Suburbs / Quarters / Villages"
                equivalent: submunicipality
                present_in_data: true
                source: "OSM Wiki Template:Admin level (unitedarab:n10 = 'Suburbs / Quarters / Villages ?', marked uncertain with '?'); OSM data (AE L10; 130 features e.g. جميرا, Rosa Village, رقة)"
        notes:
            - "Wiki value (L2) is the proposed national tagging scheme, marked '(proposed)'; the scheme is nonetheless reflected in data."
            - "Wiki defines L4, L5, L7, L8, L10 (and L2 via value); L3, L6, L9, L11 are marked n/a in the wiki."
            - "Divergence: L6 has 5 features in data (منطقة/region and ولاية/wilayah, including the Omani exclaves Madha/Bukha) despite being n/a in the wiki; name and classification derived from data + national scheme."
            - "L7 wiki value is the literal status note 'in use, fixme' rather than a named entity; mapped to 'other' as no clean semantic category applies."
            - "L10 wiki value carries a trailing '?' indicating the scheme author was uncertain about this level."
            - "partial_coverage=false: UAE lies entirely within the dataset region (Middle East extract), so coverage is not geographically truncated."
            - "All data levels (2,4,5,6,7,8,10) are represented; all wiki-defined non-n/a levels are represented."
    CY:
        name: "Cyprus"
        partial_coverage: true
        levels:
            2:
                name: "Cyprus / Κύπρος / Kıbrıs"
                equivalent: country
                present_in_data: true
                source: "OSM Wiki Template:Admin level (cyprus:value, country header); OSM data (CY L2: \"Κύπρος - Kıbrıs\", \"Akrotiri and Dhekelia\")"
            3:
                name: "De facto partitions (Republic of Cyprus / TRNC / UN buffer zone)"
                equivalent: other
                present_in_data: true
                source: "OSM Wiki Template:Admin level (cyprus:n3); OSM data (CY L3: \"Kuzey Kıbrıs\", \"Κύπρος\")"
            4:
                name: "The 6 de jure Districts"
                equivalent: district
                present_in_data: false
                source: "OSM Wiki Template:Admin level (cyprus:n4)"
            5:
                name: "Districts of RoC and TRNC (5 + 6, LAU 1)"
                equivalent: district
                present_in_data: true
                source: "OSM Wiki Template:Admin level (cyprus:n5); OSM data (CY L5: \"Επαρχία Λάρνακας\", \"Επαρχία Λεμεσού\", \"Girne ilçesi\")"
            6:
                name: "Municipalities & Community Clusters (LAU 2)"
                equivalent: municipality
                present_in_data: true
                source: "OSM Wiki Template:Admin level (cyprus:n6); OSM data (CY L6: \"Δήμος Πάφου\", \"Δήμος Λευκωσίας\", \"Δήμος Λακατάμειας\")"
            7:
                name: "Municipal Quarters"
                equivalent: submunicipality
                present_in_data: true
                source: "OSM Wiki Template:Admin level (cyprus:n7); OSM data (CY L7: \"Άγιος Δομέτιος\", \"Έγκωμη\", \"İplik Pazarı Mahallesi\")"
            8:
                name: "Communities"
                equivalent: municipality
                present_in_data: true
                source: "OSM Wiki Template:Admin level (cyprus:n8); OSM data (CY L8: \"Δήμος Λάρνακας\", \"Γεροσκήπου\", \"Λευκωσία\")"
            9:
                name: "Municipality Districts / Parishes"
                equivalent: submunicipality
                present_in_data: true
                source: "OSM Wiki Template:Admin level (cyprus:n9); OSM data (CY L9: \"Αρχάγγελος - Ανθούπολη\", \"Άγιος Μάμας\", \"Αγία Παρασκευή\")"
            10:
                name: "Settlement"
                equivalent: submunicipality
                present_in_data: false
                source: "OSM Wiki Template:Admin level (cyprus:n10)"
        notes:
            - "Disputed/partitioned territory: Cyprus is politically partitioned. Wiki defines admin_level 3 as the 'de facto partitions' between the Republic of Cyprus (RoC), the Turkish Republic of Northern Cyprus (TRNC), and the UN buffer zone. This is not a normal subnational tier, so it is classified as 'other'. Data L3 confirms 2 features ('Kuzey Kıbrıs', 'Κύπρος')."
            - "admin_level 2 in data includes 'Akrotiri and Dhekelia' (UK Sovereign Base Areas), a British Overseas Territory embedded within the island and tagged at country level alongside Cyprus itself."
            - "Wiki-defined level ABSENT in data: admin_level 4 (the 6 de jure Districts) has 0 features in the extract. The de jure district tier is not mapped; the operational district tier appears instead at L5 (wiki n5: 5 districts of RoC and 6 districts of TRNC, LAU 1). Level continuity therefore jumps from L3 directly to L5."
            - "Wiki-defined level ABSENT in data: admin_level 10 (Settlement) has 0 features in the extract."
            - "Level-2 coverage caveat: per CLAUDE.md the OSM Republic-of-Cyprus admin_level-2 polygon does not import cleanly; the project inserts a synthetic 'ne-cy-fill' coverage feature. The 2 L2 data features here are 'Κύπρος - Kıbrıs' and the Sovereign Base Areas, not a single clean RoC outline."
            - "Semantic note: both L6 (Municipalities & Community Clusters) and L8 (Communities/Koinotites) belong to Cyprus's two-track local-government system (municipalities/Dimoi vs. communities/Koinotites). Both are independent local-government units rather than sub-divisions, so both are classified 'municipality'; L8 data mixes 'Δήμος' (municipality) and community entries."
            - "Semantic note: L7 (Municipal Quarters) and L9 (Municipality Districts/Parishes) are both sub-municipal units, classified 'submunicipality'. Wiki labels L9 with 'Parishes' but they function as municipality subdivisions, so 'submunicipality' was chosen over 'parish'. L10 (Settlement) is the lowest tier and likewise classified 'submunicipality'."
            - "admin_level 11 is explicitly {{n/a}} in the wiki and absent from data; omitted."
            - "partial_coverage = true: levels 2-9 are densely populated, but the de jure district tier (L4) and Settlement tier (L10) defined in the wiki are entirely absent from the extract, and the L2 country polygon is fragmented/synthetic rather than a clean RoC outline."
    DE:
        name: "Germany"
        partial_coverage: false
        levels:
            2:
                name: "Deutschland"
                equivalent: country
                present_in_data: true
                source: "OSM data (DE L2, 1 feature: Deutschland). Wiki germany row n2 is not explicitly listed (the value/header row only holds the flag icon and border-discussion notes); L2 is the national border by OSM convention."
            4:
                name: "Bundesland"
                equivalent: state
                present_in_data: true
                source: "OSM Wiki Template:Admin level (germany:n4 'federal states border / Bundesland / NUTS 1'); OSM data (DE L4, 16 features; e.g. Mecklenburg-Vorpommern, Schleswig-Holstein, Sachsen)"
            5:
                name: "Regierungsbezirk"
                equivalent: region
                present_in_data: true
                source: "OSM Wiki Template:Admin level (germany:n5 'state-district border / Regierungsbezirk / NUTS 2'); OSM data (DE L5, 19 features; e.g. Unterfranken, Oberfranken, Regierungsbezirk Karlsruhe)"
            6:
                name: "Landkreis / Kreis / kreisfreie Stadt"
                equivalent: county
                present_in_data: true
                source: "OSM Wiki Template:Admin level (germany:n6 'county borders / Landkreis / Kreis / kreisfreie Stadt / NUTS 3'); OSM data (DE L6, 399 features; e.g. Kreis Schleswig-Flensburg, Kreis Steinburg, Flensburg)"
            7:
                name: "Amt / Samtgemeinde / Verwaltungsgemeinschaft"
                equivalent: district
                present_in_data: true
                source: "OSM Wiki Template:Admin level (germany:n7 'amt / Samtgemeinde, Verwaltungsgemeinschaft / LAU 1 (aka NUTS 4)'); OSM data (DE L7, 1205 features; e.g. Zolling (VGem), Samtgemeinde Nordkehdingen, VVG der Gemeinde Ehrenkirchen)"
            8:
                name: "Stadt / Gemeinde"
                equivalent: municipality
                present_in_data: true
                source: "OSM Wiki Template:Admin level (germany:n8 'Towns, Municipalities / City-districts / Stadt, Gemeinde / LAU 2 (aka NUTS 5)'); OSM data (DE L8, 10869 features; e.g. Weyhe, Syke, Stralsund)"
            9:
                name: "Stadtbezirk / Gemeindeteil mit Selbstverwaltung"
                equivalent: borough
                present_in_data: true
                source: "OSM Wiki Template:Admin level (germany:n9 'Parts of a municipality with parish councils / self_government - Stadtbezirk / Gemeindeteil mit Selbstverwaltung'); OSM data (DE L9, 10256 features; e.g. Reinickendorf, Spandau, Mitte)"
            10:
                name: "Stadtteil / Gemeindeteil ohne Selbstverwaltung / Gemarkung"
                equivalent: submunicipality
                present_in_data: true
                source: "OSM Wiki Template:Admin level (germany:n10 'Parts of a municipality without ... - Stadtteil / Gemeindeteil ohne Selbstverwaltung / Gemarkung'); OSM data (DE L10, 9192 features; e.g. Frohnau, Charlottenburg-Nord, Hansaviertel)"
            11:
                name: "Flur"
                equivalent: submunicipality
                present_in_data: true
                source: "OSM Wiki Template:Admin level (germany:n11 'subdivision of Gemarkung - Flur'); OSM data (DE L11, 1568 features; e.g. Erle-Middelich, Beckhausen-Schaffrath, Pfinzweiler)"
            12:
                name: "Gemarkung-/Flur-Untergliederung (Straße/Block)"
                equivalent: submunicipality
                present_in_data: true
                source: "OSM data (DE L12, 15 features; e.g. Kammerberg, Isolde-Kurz-Straße, Von-Schonebeck-Ring). NOT defined in OSM Wiki (max documented level is n11); name derived from example_names which are sub-Flur fragments / streets / blocks."
        notes:
            - "Verified against temp/wiki_levels.tsv (germany rows) and temp/admin_level_inventory.txt (DE rows)."
            - "Wiki germany:n3 = {{n/a}} (explicitly not applicable) and is absent from the data, so no L3 entry is included."
            - "Data levels present: 2,4,5,6,7,8,9,10,11,12. Wiki-defined (non-n/a) levels: 4,5,6,7,8,9,10,11. Every wiki-defined level is present in the data, hence partial_coverage=false."
            - "L12 is present in data (15 features) but is NOT documented in the OSM Wiki (germany table stops at n11); its examples are street/block-level fragments below Flur, classified as submunicipality."
            - "L2 header row (germany 'value') contains only MediaWiki markup (flag icon, border-discussion links); no explicit n2 name, so the L2 name 'Deutschland' is taken from the data."
    FI:
        name: "Finland"
        partial_coverage: false
        levels:
            2:
                name: "Finland (Suomi)"
                equivalent: country
                present_in_data: true
                source: "OSM data (FI L2; Suomi / Finland); OSM Wiki Template:Admin level (finland:value, country header)"
            3:
                name: "Main areas (Pääalueet, NUTS 1)"
                equivalent: region
                present_in_data: true
                source: "OSM Wiki Template:Admin level (finland:n3, 'Main areas (Pääalueet, NUTS 1): Manner-Suomi'); OSM data (FI L3; Manner-Suomi)"
            4:
                name: "Regions (Maakunnat, NUTS 3)"
                equivalent: state
                present_in_data: true
                source: "OSM Wiki Template:Admin level (finland:n4, 'Regions (Maakunnat, NUTS 3): Uusimaa'); OSM data (FI L4, 18 features; e.g. Uusimaa, Varsinais-Suomi, Pirkanmaa)"
            7:
                name: "Sub-regions (Seutukunnat, LAU 1)"
                equivalent: district
                present_in_data: true
                source: "OSM Wiki Template:Admin level (finland:n7, 'Sub-regions (Seutukunnat, LAU 1): Helsingin seutukunta'); OSM data (FI L7, 67 features; e.g. Helsingin seutukunta, Jyväskylän seutukunta)"
            8:
                name: "Municipalities (Kunnat / Kaupungit, LAU 2)"
                equivalent: municipality
                present_in_data: true
                source: "OSM Wiki Template:Admin level (finland:n8, 'municipalities (Kunnat / Kaupungit, LAU 2): Helsinki'); OSM data (FI L8, 292 features; e.g. Helsinki, Vantaa, Espoo)"
            9:
                name: "Villages (kylät) / large sub-areas of city districts (kaupunginosien/kunnanosien suuralueet)"
                equivalent: submunicipality
                present_in_data: true
                source: "OSM Wiki Template:Admin level (finland:n9, 'villages (kylät), Kaupunginosien/kunnanosien suuralueet (Helsinki; Espoo, Vantaa ...)'); OSM data (FI L9, 231 features; e.g. Lohja, Hämeenlinna)"
            10:
                name: "City/municipal districts (kaupunginosat / kunnanosat)"
                equivalent: submunicipality
                present_in_data: true
                source: "OSM Wiki Template:Admin level (finland:n10, 'City/municipal districts(kaupunginosat/kunnanosat): Kulosaari'); OSM data (FI L10, 1764 features; e.g. Kulosaari, Lammi, Rahola)"
            11:
                name: "Sub-districts / quarters (neighbourhoods)"
                equivalent: submunicipality
                present_in_data: true
                source: "OSM data (FI L11, 217 features; e.g. Hernesaari, Jätkäsaari, Ruoholahti) — derived from example_names; OSM Wiki marks finland:n11 as {{n/a}}"
        notes:
            - "Country header in the wiki is flagged as a proposal: '(proposed by User:Boozeman, augmented by User:Skela)' — the Finnish scheme is a community proposal, not an official OSM-ratified standard. The L2 name 'Finland (Suomi)' is taken from the OSM data value, not from the proposal markup."
            - "Wiki levels n5 and n6 are explicitly {{n/a|align=left}} (not used) and are absent from the data; omitted from the mapping."
            - "Wiki n11 is marked {{n/a|align=left}}, but the data DOES contain 217 features at L11 (e.g. Hernesaari, Jätkäsaari, Ruoholahti — Helsinki neighbourhoods/quarters). L11 name derived from example_names and the national sub-municipal scheme since the wiki defines it as undefined."
            - "Level 3 (Manner-Suomi = Mainland Finland, NUTS 1) is a single grouping feature (count 1); it does not cover the autonomous Åland Islands (Ahvenanmaa), which is the other NUTS 1 main area. Åland's NUTS 1 main area is not present as an L3 feature in the extract."
            - "L4 Regions (Maakunnat) are the de facto first-order administrative subdivision and are classified as 'state'; L3 (NUTS 1 main areas) is a higher statistical grouping classified as 'region'."
            - "L9 has a dual meaning in the wiki: rural villages (kylät) AND large sub-areas of city districts in the biggest cities (Helsinki, Espoo, Vantaa); both map to sub-municipal units. Data example names (Lohja, Hämeenlinna) reflect this mixed usage."
            - "L7 Sub-regions (Seutukunnat, LAU 1) are statistical groupings of municipalities; classified as 'district' as the closest semantic fit (no province/county tier exists between region and municipality in the modern Finnish scheme)."
            - "Extract covers all wiki-defined levels (L2-L4, L7-L10) plus L11 which the wiki leaves undefined; every level is populated in the data, so partial_coverage is false."
    GR:
        name: "Greece"
        partial_coverage: false
        levels:
            2:
                name: "Ελλάς (Greece)"
                equivalent: country
                present_in_data: true
                source: "OSM Wiki Template:Admin level (greece:value, country header '(in use)'); OSM data (GR L2; 1 feature: Ελλάς)"
            3:
                name: "Αυτόνομη Μοναστική Πολιτεία Αγίου Όρους (Autonomous Monastic State of Mount Athos)"
                equivalent: other
                present_in_data: true
                source: "OSM Wiki Template:Admin level (greece:n3, Wikipedia link 'αυτόνομης μοναστικής πολιτείας Αγίου Όρους'); OSM data (GR L3; 1 feature: Αυτόνομη Μοναστική Πολιτεία Αγίου Όρους)"
            4:
                name: "Αποκεντρωμένες διοικήσεις (Decentralized Administrations)"
                equivalent: region
                present_in_data: true
                source: "OSM Wiki Template:Admin level (greece:n4, Wikipedia link 'Αποκεντρωμένων διοικήσεων'); OSM data (GR L4; 7 features, e.g. Αποκεντρωμένη Διοίκηση Αττικής)"
            5:
                name: "Περιφέρειες (Regions, NUTS 2)"
                equivalent: state
                present_in_data: true
                source: "OSM Wiki Template:Admin level (greece:n5, 'Περιφερειών' + NUTS 2); OSM data (GR L5; 13 features, e.g. Περιφέρεια Κρήτης)"
            6:
                name: "Περιφερειακές ενότητες (Regional units, NUTS 3)"
                equivalent: province
                present_in_data: true
                source: "OSM Wiki Template:Admin level (greece:n6, 'Περιφερειακών ενοτήτων' + NUTS 3); OSM data (GR L6; 74 features, e.g. Περιφερειακή Ενότητα Λάρισας)"
            7:
                name: "Δήμοι (Municipalities)"
                equivalent: municipality
                present_in_data: true
                source: "OSM Wiki Template:Admin level (greece:n7, 'Δήμων'); OSM data (GR L7; 333 features, e.g. Δήμος Αθηναίων)"
            8:
                name: "Δημοτικές ενότητες (Municipal units)"
                equivalent: submunicipality
                present_in_data: true
                source: "OSM Wiki Template:Admin level (greece:n8, 'Δημοτικών ενοτήτων'); OSM data (GR L8; 465 features, e.g. Δημοτική Ενότητα Βούλας)"
            9:
                name: "Δημοτικές/Τοπικές κοινότητες (Municipal/local communities, LAU)"
                equivalent: submunicipality
                present_in_data: true
                source: "OSM Wiki Template:Admin level (greece:n9, 'Δημοτικών κοινοτήτων' + LAU); OSM data (GR L9; 1408 features, e.g. Κοινότητα Λεπενούς)"
            10:
                name: "Κοινότητες (Communities / sub-community settlement units)"
                equivalent: submunicipality
                present_in_data: true
                source: "OSM data (GR L10; 554 features, e.g. Κ. Άμπλιανης, Κ. Δομνίστας) — wiki marks n10 as {{n/a}}, so name derived from example_names ('Κ.' = Κοινότητα abbreviation)"
        notes:
            - "Wiki defines levels n3-n9 (each as a {{Wikipedia|el|...|<display>}} link); n2 is given via the country header row ('(in use)'); n10 and n11 are explicitly {{n/a}} (undefined)."
            - "Wiki display text is the genitive-plural form (e.g. 'Αποκεντρωμένων διοικήσεων', 'Περιφερειών', 'Δήμων', 'Δημοτικών ενοτήτων', 'Δημοτικών κοινοτήτων'); names above were normalized to the nominative-plural form used in the data and in standard usage. English glosses retained."
            - "Level 10 IS present in the data (554 features, e.g. Κ. Άμπλιανης) despite being {{n/a}} in the wiki. Names are abbreviated as 'Κ.' (= Κοινότητα). Classified as submunicipality (sub-community/settlement-level unit); name and equivalent derived from example_names plus the Greek Καλλικράτης scheme, not from the wiki."
            - "Greek local-government hierarchy under the 2010 Καλλικράτης reform: Decentralized Administrations (L4, state-appointed groupings of regions) > Regions/Περιφέρειες (L5, elected, NUTS 2) > Regional units/Περιφερειακές ενότητες (L6, NUTS 3) > Municipalities/Δήμοι (L7) > Municipal units/Δημοτικές ενότητες (L8, former pre-2010 municipalities) > Municipal/local communities/Κοινότητες (L9, LAU) > communities (L10)."
            - "Semantic mapping note: L4 (Decentralized Administrations) classified as 'region' (administrative grouping above the elected regions); L5 (Περιφέρειες) classified as 'state' as the principal first-order self-governing subdivision; L6 (regional units) as 'province'. These are by-meaning classifications, not by literal NUTS rank."
            - "Mount Athos (L3, Αυτόνομη Μοναστική Πολιτεία Αγίου Όρους) is an autonomous monastic polity / self-governing region within Greece — classified 'other' as it does not fit a standard administrative tier. It is both wiki-defined (n3) and present in data (1 feature)."
            - "Levels 8, 9 and 10 are all sub-municipal community/settlement tiers and were all classified 'submunicipality'; the wiki distinguishes only down to n9 (Δημοτικές κοινότητες, LAU)."
            - "Coverage looks complete for the country: L2 country polygon present (1 feature) plus all defined sub-levels, so partial_coverage = false."
            - "n11 ({{n/a}}) is undefined in the wiki and absent from data, so it is omitted."
