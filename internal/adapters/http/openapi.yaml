openapi: 3.0.3
info:
  title: Ortus Source Query API
  description: |
    REST API für die Abfrage von Datenquellen mittels Punktkoordinaten.

    Ortus ermöglicht die effiziente räumliche Abfrage von Datenquellen und unterstützt
    verschiedene Koordinatensysteme (SRIDs). Die API kann mehrere Datenquellen gleichzeitig
    verwalten und abfragen.

    ## Koordinatensysteme

    Die API unterstützt verschiedene Koordinatensysteme über den `srid` Parameter:
    - **4326** (WGS84): Standard GPS-Koordinaten (lon/lat)
    - **3857** (Web Mercator): Web-Mapping Standard
    - **25832/25833** (ETRS89/UTM): Deutscher/EU Standard
    - **31466/31467** (DHDN/Gauß-Krüger): Deutsches Legacy-System

    ## Authentifizierung

    Derzeit ist keine Authentifizierung erforderlich.
  version: 1.0.0
  contact:
    name: Ortus API Support
    url: https://github.com/jobrunner/ortus
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: /api/v1
    description: API Version 1
  - url: /
    description: Root (für Health-Endpoints)

tags:
  - name: Query
    description: Räumliche Punktabfragen auf Datenquellen
  - name: Gazetteer
    description: Reverse-Geocoding auf die Verwaltungseinheit und Peilung (bearing)
  - name: Sources
    description: Datenquellen-Verwaltung und -Information
  - name: Health
    description: Gesundheitsprüfungen und Kubernetes-Probes

paths:
  /query:
    get:
      tags:
        - Query
      summary: Alle Datenquellen abfragen
      description: |
        Führt eine Punktabfrage über alle registrierten Datenquellen durch.

        Koordinaten können entweder als `lon/lat` (für WGS84) oder als `x/y`
        (für andere Koordinatensysteme) angegeben werden.
      operationId: queryAllSources
      parameters:
        - $ref: '#/components/parameters/LonParam'
        - $ref: '#/components/parameters/LatParam'
        - $ref: '#/components/parameters/XParam'
        - $ref: '#/components/parameters/YParam'
        - $ref: '#/components/parameters/SridParam'
        - $ref: '#/components/parameters/PropertiesParam'
        - $ref: '#/components/parameters/WithGazetteerParam'
      responses:
        '200':
          description: Erfolgreiche Abfrage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
              example:
                coordinate:
                  x: 13.405
                  y: 52.52
                  srid: 4326
                results:
                  - source_id: districts
                    source_name: districts.gpkg
                    features:
                      - id: 42
                        layer: districts
                        properties:
                          name: Mitte
                          population: 384172
                        geometry:
                          type: MULTIPOLYGON
                          wkt: "MULTIPOLYGON(((13.3 52.5, 13.4 52.5, 13.4 52.6, 13.3 52.6, 13.3 52.5)))"
                    feature_count: 1
                    query_time_ms: 5
                    license:
                      name: CC BY 4.0
                      url: https://creativecommons.org/licenses/by/4.0/
                      attribution: "© OpenData Berlin"
                total_features: 1
                processing_time_ms: 12
                gazetteer:
                  admin:
                    country_iso: DE
                    hierarchy:
                      - level: 4
                        name: Berlin
                        name_native: ""
                        name_source: latin-osm
                        equivalent: state
                        local_term: Land
                        equivalent_description: First-level subdivision (state, region, province).
                  bearing:
                    reference: Berlin
                    name_native: ""
                    name_source: latin-osm
                    class: city
                    distance_km: 0.0
                    azimuth: 0.0
                    compass: ""
                    label: "bei Berlin"
                  sources:
                    - code: latin-osm
                      short: OSM name (already Latin)
                      long: Taken verbatim from the OpenStreetMap name tag; already Latin script, no transliteration applied.
                      standard: ""
                  license:
                    name: "ODbL-1.0"
                    url: "https://opendatacommons.org/licenses/odbl/1-0/"
                    attribution: "© OpenStreetMap contributors (ODbL 1.0); Natural Earth (public domain); GeoNames (CC BY 4.0); NGA GNS (public domain)"
        '400':
          description: Ungültige Parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingCoordinates:
                  summary: Fehlende Koordinaten
                  value:
                    error: Bad Request
                    message: "coordinates required: use lon/lat or x/y"
                invalidLon:
                  summary: Ungültige Longitude
                  value:
                    error: Bad Request
                    message: "invalid lon parameter"
        '500':
          description: Interner Serverfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /query/{sourceId}:
    get:
      tags:
        - Query
      summary: Spezifische Datenquelle abfragen
      description: Führt eine Punktabfrage auf einer bestimmten Datenquelle durch.
      operationId: querySource
      parameters:
        - $ref: '#/components/parameters/SourceIdParam'
        - $ref: '#/components/parameters/LonParam'
        - $ref: '#/components/parameters/LatParam'
        - $ref: '#/components/parameters/XParam'
        - $ref: '#/components/parameters/YParam'
        - $ref: '#/components/parameters/SridParam'
        - $ref: '#/components/parameters/PropertiesParam'
      responses:
        '200':
          description: Erfolgreiche Abfrage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '400':
          description: Ungültige Parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Datenquelle nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Not Found
                message: Source not found
        '500':
          description: Interner Serverfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /gazetteer:
    get:
      tags:
        - Gazetteer
      summary: Reverse-Geocoding + Peilung
      description: |
        Löst eine Koordinate auf ihre Verwaltungshierarchie (`admin`) auf und berechnet
        eine Peilung zum salientesten nahen Ort (`bearing`, z. B. "4 km E Würzburg").
        Jeder Teil ist `null`, wenn es kein Ergebnis gibt — keine Admin-Abdeckung bzw.
        kein Anker in Reichweite. Nur verfügbar, wenn das Gazetteer-Feature aktiv ist.
      operationId: gazetteer
      parameters:
        - $ref: '#/components/parameters/LonParam'
        - $ref: '#/components/parameters/LatParam'
        - $ref: '#/components/parameters/XParam'
        - $ref: '#/components/parameters/YParam'
        - $ref: '#/components/parameters/SridParam'
      responses:
        '200':
          description: Erfolgreiche Abfrage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GazetteerResponse'
              example:
                coordinate:
                  x: 9.93
                  y: 49.79
                  srid: 4326
                admin:
                  country_iso: DE
                  hierarchy:
                    - level: 8
                      name: Würzburg
                      name_native: ""          # empty: already-Latin name (identical to name)
                      name_source: latin-osm
                      equivalent: municipality
                      local_term: Kreisfreie Stadt
                      equivalent_description: Local municipal authority (city/town/commune).
                    - level: 4
                      name: Bayern
                      name_native: ""          # empty: already-Latin name (identical to name)
                      name_source: latin-osm
                      equivalent: state
                      local_term: Land
                      equivalent_description: First-level subdivision (state, region, province).
                bearing:
                  reference: Würzburg
                  name_native: ""            # empty: already-Latin name (identical to reference)
                  name_source: latin-osm
                  class: city
                  distance_km: 4.0
                  azimuth: 90.0
                  compass: E
                  label: "4 km E Würzburg"
                sources:
                  - code: latin-osm
                    short: OSM name (already Latin)
                    long: Taken verbatim from the OpenStreetMap name tag; already Latin script, no transliteration applied.
                    standard: ""    # latin-osm has no romanization standard (null in the manifest)
                license:
                  name: "ODbL-1.0"
                  url: "https://opendatacommons.org/licenses/odbl/1-0/"
                  attribution: "© OpenStreetMap contributors (ODbL 1.0); Natural Earth (public domain); GeoNames (CC BY 4.0); NGA GNS (public domain)"
        '400':
          description: Ungültige Parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Interner Serverfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sources:
    get:
      tags:
        - Sources
      summary: Alle Datenquellen auflisten
      description: Gibt eine Liste aller registrierten Datenquellen zurück.
      operationId: listSources
      responses:
        '200':
          description: Liste der Datenquellen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceList'
              example:
                sources:
                  - id: districts
                    name: districts.gpkg
                    path: /data/districts.gpkg
                    size: 1048576
                    layer_count: 2
                    indexed: true
                    ready: true
                    loaded_at: "2024-01-15T10:30:00Z"
                    last_queried: "2024-01-15T10:35:00Z"
                count: 1
        '500':
          description: Interner Serverfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sources/{sourceId}:
    get:
      tags:
        - Sources
      summary: Datenquellen-Details abrufen
      description: Gibt detaillierte Informationen zu einer bestimmten Datenquelle zurück.
      operationId: getSource
      parameters:
        - $ref: '#/components/parameters/SourceIdParam'
      responses:
        '200':
          description: Datenquellen-Details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        '404':
          description: Datenquelle nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Interner Serverfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sources/{sourceId}/layers:
    get:
      tags:
        - Sources
      summary: Datenquellen-Layer abrufen
      description: Gibt alle Layer einer bestimmten Datenquelle zurück.
      operationId: getSourceLayers
      parameters:
        - $ref: '#/components/parameters/SourceIdParam'
      responses:
        '200':
          description: Liste der Layer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LayerList'
              example:
                source_id: districts
                layers:
                  - name: districts
                    description: Administrative Bezirke
                    geometry_type: MULTIPOLYGON
                    geometry_column: geom
                    srid: 4326
                    has_index: true
                    feature_count: 12
                    extent:
                      min_x: 13.088
                      min_y: 52.338
                      max_x: 13.761
                      max_y: 52.675
                count: 1
        '404':
          description: Datenquelle nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Interner Serverfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /health:
    get:
      tags:
        - Health
      summary: Detaillierter Gesundheitsstatus
      description: |
        Gibt detaillierte Informationen über den Gesundheitszustand des Services zurück.
        Enthält Informationen über geladene Datenquellen und den Status einzelner Komponenten.
      operationId: getHealth
      servers:
        - url: /
          description: Root
      responses:
        '200':
          description: Service ist gesund
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              example:
                status: ok
                ready: true
                sources_loaded: 3
                sources_ready: 3
                components:
                  storage: ok
        '503':
          description: Service ist nicht gesund
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              example:
                status: unhealthy
                ready: false
                sources_loaded: 0
                sources_ready: 0
                components:
                  storage: ok

  /health/live:
    get:
      tags:
        - Health
      summary: Kubernetes Liveness Probe
      description: |
        Einfacher Liveness-Check für Kubernetes.
        Gibt 200 zurück, wenn der Service läuft, sonst 503.
      operationId: getLiveness
      servers:
        - url: /
          description: Root
      responses:
        '200':
          description: Service ist aktiv
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleStatus'
              example:
                status: ok
        '503':
          description: Service ist nicht aktiv
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleStatus'
              example:
                status: unhealthy

  /health/ready:
    get:
      tags:
        - Health
      summary: Kubernetes Readiness Probe
      description: |
        Readiness-Check für Kubernetes.
        Gibt 200 zurück, wenn der Service bereit ist, Anfragen zu verarbeiten, sonst 503.
      operationId: getReadiness
      servers:
        - url: /
          description: Root
      responses:
        '200':
          description: Service ist bereit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleStatus'
              example:
                status: ok
        '503':
          description: Service ist nicht bereit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleStatus'
              example:
                status: not ready

components:
  parameters:
    SourceIdParam:
      name: sourceId
      in: path
      required: true
      description: Die eindeutige ID der Datenquelle
      schema:
        type: string
      example: districts

    LonParam:
      name: lon
      in: query
      description: Longitude (Längengrad) für WGS84-Koordinaten
      schema:
        type: number
        format: double
        minimum: -180
        maximum: 180
      example: 13.405

    LatParam:
      name: lat
      in: query
      description: Latitude (Breitengrad) für WGS84-Koordinaten
      schema:
        type: number
        format: double
        minimum: -90
        maximum: 90
      example: 52.52

    XParam:
      name: x
      in: query
      description: X-Koordinate für andere Koordinatensysteme
      schema:
        type: number
        format: double
      example: 389283

    YParam:
      name: y
      in: query
      description: Y-Koordinate für andere Koordinatensysteme
      schema:
        type: number
        format: double
      example: 5819450

    SridParam:
      name: srid
      in: query
      description: |
        Spatial Reference ID der Eingabekoordinaten.
        Standard ist 4326 (WGS84).
      schema:
        type: integer
        default: 4326
      example: 4326

    PropertiesParam:
      name: properties
      in: query
      description: |
        Komma-separierte Liste von Eigenschaften, die zurückgegeben werden sollen.
        Wenn nicht angegeben, werden alle Eigenschaften zurückgegeben.
      schema:
        type: string
      example: name,population

    WithGazetteerParam:
      name: with-gazetteer
      in: query
      description: |
        Steuert die Gazetteer-Anreicherung der Antwort um einen `gazetteer`-Block
        (Verwaltungshierarchie, Peilung, name_source-Erläuterungen und Datensatz-
        Attribution). **Standard: an**, sofern das Gazetteer-Feature aktiv ist — so
        erhält ein Client alle Infos in einem Aufruf. Mit einem expliziten Falsy-Wert
        (`0`/`false`/`no`/`off`) abschalten, um die zusätzliche Locate+Bearing-Arbeit
        zu sparen. Best-effort: ein Gazetteer-Fehler bricht die eigentliche Abfrage
        nicht ab (der Block entfällt dann).
      schema:
        type: string
        enum: ["0", "1", "true", "false", "yes", "no", "on", "off"]
        default: "1"
      example: "0"

  schemas:
    GazetteerResponse:
      type: object
      description: Reverse-Geocoding- und Peilungs-Ergebnis für eine Koordinate.
      allOf:
        - type: object
          properties:
            coordinate:
              $ref: '#/components/schemas/Coordinate'
        - $ref: '#/components/schemas/GazetteerData'

    GazetteerData:
      type: object
      description: >-
        Gazetteer-Anreicherung für eine Koordinate: Verwaltungshierarchie (admin),
        Peilung (bearing), name_source-Erläuterungen (sources) und Datensatz-Lizenz/
        Attribution (license). Geliefert von GET /api/v1/gazetteer und — standardmäßig
        — im `gazetteer`-Block von GET /api/v1/query.
      properties:
        admin:
          nullable: true
          type: object
          description: Verwaltungshierarchie, die die Koordinate enthält (null ohne Abdeckung).
          properties:
            country_iso:
              type: string
              description: ISO 3166-1 alpha-2 Ländercode.
            hierarchy:
              type: array
              description: Ebenen, lokalste zuerst.
              items:
                type: object
                properties:
                  level:
                    type: integer
                    description: OSM admin_level.
                  name:
                    type: string
                    description: Name in lateinischer Schrift (immer gesetzt).
                  name_native:
                    type: string
                    description: Name in Originalschrift (leer, wenn identisch mit name).
                  name_source:
                    type: string
                    description: >-
                      Codierung der Namensherkunft/Romanisierung; im
                      response-weiten sources-Block beschrieben. Leer, wenn keine.
                  equivalent:
                    type: string
                    description: Semantische Bedeutung (country | state | … | municipality).
                  local_term:
                    type: string
                    description: Landesspezifischer Begriff für diese Ebene (z. B. „Landkreis").
                  equivalent_description:
                    type: string
                    description: Generische Beschreibung des equivalent-Levels.
        bearing:
          nullable: true
          type: object
          description: Peilung zum salientesten nahen Ort (null ohne Anker in Reichweite).
          properties:
            reference:
              type: string
              description: Name des Anker-Orts (lateinische Schrift).
            name_native:
              type: string
              description: Name des Anker-Orts in Originalschrift (leer, wenn identisch).
            name_source:
              type: string
              description: >-
                Codierung der Namensherkunft/Romanisierung des Ankers; im
                response-weiten sources-Block beschrieben. Leer, wenn keine.
            class:
              type: string
              description: OSM place-Klasse (village | town | city).
            distance_km:
              type: number
              format: double
            azimuth:
              type: number
              format: double
              description: Azimut Referenz→Punkt in Grad (0=N, 90=O).
            compass:
              type: string
              description: Quantisierte Himmelsrichtung (z. B. E, NW).
            label:
              type: string
              description: Fertiges Label, z. B. „4 km E Würzburg".
        sources:
          type: array
          description: >-
            Response-weiter Herkunfts-Auszug: jede in admin/bearing vorkommende
            name_source-Codierung wird hier genau einmal beschrieben (nicht pro
            Datensatz wiederholt). Leeres Array, wenn keine Codierungen gesetzt sind.
          items:
            type: object
            properties:
              code:
                type: string
                description: Codierung, auf die name_source verweist.
              short:
                type: string
                description: Kurzbezeichnung der Quelle/Codierung.
              long:
                type: string
                description: Ausführliche Beschreibung der Quelle/Codierung.
              standard:
                type: string
                description: Zugrundeliegender Standard bzw. Zitierhinweis.
        license:
          type: object
          nullable: true
          description: >-
            Datensatzweite Lizenz/Attribution der Gazetteer-Daten (z. B. OSM/ODbL,
            GeoNames, Natural Earth), aus dem Manifest (ortus-gazetteer.yaml). Fehlt,
            wenn im Manifest keine Lizenz gesetzt ist. Diese Attribution muss ein
            Client anzeigen.
          properties:
            name:
              type: string
              description: Lizenzname (SPDX-Id oder Bezeichnung), z. B. "ODbL-1.0".
            url:
              type: string
              description: Link zum Lizenztext.
            attribution:
              type: string
              description: Anzuzeigender Attributionstext.

    Coordinate:
      type: object
      description: Geografische Koordinate
      properties:
        x:
          type: number
          format: double
          description: X-Koordinate (Longitude bei WGS84)
        y:
          type: number
          format: double
          description: Y-Koordinate (Latitude bei WGS84)
        srid:
          type: integer
          description: Spatial Reference ID
      required:
        - x
        - y
        - srid

    Geometry:
      type: object
      description: Geometrie im WKT-Format
      properties:
        type:
          type: string
          description: Geometrietyp
          enum:
            - POINT
            - LINESTRING
            - POLYGON
            - MULTIPOINT
            - MULTILINESTRING
            - MULTIPOLYGON
            - GEOMETRYCOLLECTION
        wkt:
          type: string
          description: Well-Known Text Repräsentation
      required:
        - type
        - wkt

    Feature:
      type: object
      description: Geografisches Feature mit Eigenschaften
      properties:
        id:
          type: integer
          format: int64
          description: Feature-ID
        layer:
          type: string
          description: Name des Layers
        properties:
          type: object
          additionalProperties: true
          description: Schlüssel-Wert-Paare der Feature-Eigenschaften
        geometry:
          $ref: '#/components/schemas/Geometry'
      required:
        - id
        - layer
        - properties

    License:
      type: object
      description: Lizenzinformationen
      properties:
        name:
          type: string
          description: Name der Lizenz
        url:
          type: string
          format: uri
          description: URL zur Lizenz
        attribution:
          type: string
          description: Attributionstext

    QueryResult:
      type: object
      description: Abfrageergebnis für eine einzelne Datenquelle
      properties:
        source_id:
          type: string
          description: ID der Datenquelle
        source_name:
          type: string
          description: Name der Datenquelle
        features:
          type: array
          items:
            $ref: '#/components/schemas/Feature'
          description: Gefundene Features
        feature_count:
          type: integer
          description: Anzahl der Features
        query_time_ms:
          type: integer
          format: int64
          description: Abfragezeit in Millisekunden
        license:
          $ref: '#/components/schemas/License'
      required:
        - source_id
        - source_name
        - features
        - feature_count
        - query_time_ms

    QueryResponse:
      type: object
      description: Vollständige Abfrageantwort
      properties:
        coordinate:
          $ref: '#/components/schemas/Coordinate'
        results:
          type: array
          items:
            $ref: '#/components/schemas/QueryResult'
          description: Ergebnisse pro Datenquelle
        total_features:
          type: integer
          description: Gesamtanzahl der gefundenen Features
        processing_time_ms:
          type: integer
          format: int64
          description: Gesamte Verarbeitungszeit in Millisekunden
        gazetteer:
          allOf:
            - $ref: '#/components/schemas/GazetteerData'
          nullable: true
          description: >-
            Gazetteer-Anreicherung (admin, bearing, sources, license). Standardmäßig
            enthalten, wenn das Gazetteer-Feature aktiv ist — mit with-gazetteer=0
            abschaltbar. Fehlt, wenn das Feature aus ist oder abgeschaltet wurde.
      required:
        - coordinate
        - results
        - total_features
        - processing_time_ms

    Extent:
      type: object
      description: Räumliche Ausdehnung (Bounding Box)
      properties:
        min_x:
          type: number
          format: double
        min_y:
          type: number
          format: double
        max_x:
          type: number
          format: double
        max_y:
          type: number
          format: double
      required:
        - min_x
        - min_y
        - max_x
        - max_y

    Layer:
      type: object
      description: Datenquellen-Layer
      properties:
        name:
          type: string
          description: Name des Layers
        description:
          type: string
          description: Beschreibung des Layers
        geometry_type:
          type: string
          description: Geometrietyp
          enum:
            - POINT
            - LINESTRING
            - POLYGON
            - MULTIPOINT
            - MULTILINESTRING
            - MULTIPOLYGON
            - GEOMETRYCOLLECTION
        geometry_column:
          type: string
          description: Name der Geometriespalte
        srid:
          type: integer
          description: Spatial Reference ID
        has_index:
          type: boolean
          description: Hat einen räumlichen Index
        feature_count:
          type: integer
          description: Anzahl der Features
        extent:
          $ref: '#/components/schemas/Extent'
      required:
        - name
        - geometry_type
        - geometry_column
        - srid
        - has_index
        - feature_count

    LayerList:
      type: object
      description: Liste von Layern
      properties:
        source_id:
          type: string
          description: ID der Datenquelle
        layers:
          type: array
          items:
            $ref: '#/components/schemas/Layer'
        count:
          type: integer
          description: Anzahl der Layer
      required:
        - source_id
        - layers
        - count

    Source:
      type: object
      description: Datenquellen-Informationen
      properties:
        id:
          type: string
          description: Eindeutige ID der Datenquelle
        name:
          type: string
          description: Anzeigename
        path:
          type: string
          description: Dateipfad
        size:
          type: integer
          format: int64
          description: Dateigröße in Bytes
        layer_count:
          type: integer
          description: Anzahl der Layer
        indexed:
          type: boolean
          description: Alle Indizes erstellt
        ready:
          type: boolean
          description: Bereit für Abfragen
        loaded_at:
          type: string
          format: date-time
          description: Zeitpunkt des Ladens
        last_queried:
          type: string
          format: date-time
          description: Zeitpunkt der letzten Abfrage
      required:
        - id
        - name
        - path
        - size
        - layer_count
        - indexed
        - ready

    SourceList:
      type: object
      description: Liste von Datenquellen
      properties:
        sources:
          type: array
          items:
            $ref: '#/components/schemas/Source'
        count:
          type: integer
          description: Anzahl der Datenquellen
      required:
        - sources
        - count

    HealthStatus:
      type: object
      description: Detaillierter Gesundheitsstatus
      properties:
        status:
          type: string
          enum:
            - ok
            - unhealthy
        ready:
          type: boolean
          description: Service ist bereit für Anfragen
        sources_loaded:
          type: integer
          description: Anzahl geladener Datenquellen
        sources_ready:
          type: integer
          description: Anzahl abfragebereiter Datenquellen
        components:
          type: object
          additionalProperties:
            type: string
          description: Status einzelner Komponenten
      required:
        - status
        - ready
        - sources_loaded
        - sources_ready

    SimpleStatus:
      type: object
      description: Einfacher Status
      properties:
        status:
          type: string
          enum:
            - ok
            - unhealthy
            - not ready
      required:
        - status

    Error:
      type: object
      description: Fehlermeldung
      properties:
        error:
          type: string
          description: HTTP-Statustext
        message:
          type: string
          description: Detaillierte Fehlermeldung
      required:
        - error
        - message
