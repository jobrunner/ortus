# gremlins mutation-testing config. The CI job (.github/workflows/mutation.yml)
# is a HARD GATE: it runs each package with per-package --threshold-efficacy /
# --threshold-mcover flags (domain is held to a stricter bar than application)
# and FAILS the build when the mutation score regresses below the ratcheted
# baseline. Coverage says a line ran; mutation says a test would have caught a
# bug in it.
#
# These globals stay 0 on purpose: the gate's thresholds are PER PACKAGE and
# live in the CI workflow (.github/workflows/mutation.yml) and `make mutation`,
# which pass explicit --threshold-efficacy / --threshold-mcover flags. Keeping
# the globals at 0 means a bare, ad-hoc `gremlins unleash <pkg>` stays
# informational and never applies one package's threshold to another.
# Per-package baselines the gate enforces (raise them as tests improve):
#   internal/domain       efficacy >= 90 %, mutator-coverage >= 95 %  (last: 95 / 100)
#   internal/application  efficacy >= 70 %, mutator-coverage >= 88 %  (last: 73 / 91)
unleash:
  threshold-efficacy: 0
  threshold-mcover: 0
