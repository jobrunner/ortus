# GoReleaser Konfiguration für ortus
# Dokumentation: https://goreleaser.com

version: 2

project_name: ortus

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: ortus
    main: ./cmd/ortus
    binary: ortus
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.BuildTime={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

# Release notes are owned by release-please (it writes CHANGELOG.md and the
# GitHub Release body). goreleaser only builds + attaches binaries, so it does
# not generate its own changelog.
changelog:
  disable: true

release:
  github:
    owner: jobrunner
    name: ortus
  # release-please has already created the tagged GitHub Release; append the
  # build artifacts to it instead of creating a (draft) duplicate.
  mode: append
