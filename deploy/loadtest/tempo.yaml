# Minimal single-binary Tempo for local trace storage. Receives OTLP from the
# native ortus process and serves traces to Grafana.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m # cut blocks quickly so traces show up fast in dev

compactor:
  compaction:
    block_retention: 24h # dev retention; load-test traces don't need to live long

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
