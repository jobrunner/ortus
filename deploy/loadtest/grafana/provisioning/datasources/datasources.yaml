apiVersion: 1

# Three datasources wired for cross-signal correlation via the trace_id that
# ortus stamps into every span and (when a span is active) every log line:
#   - Loki  -> Tempo : derived field extracts trace_id from the JSON log, links to the trace
#   - Tempo -> Loki  : "Logs for this span" filters Loki by the trace_id
#   - Prometheus exemplars -> Tempo (when present)
datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-5m'
        spanEndTimeShift: '5m'
        filterByTraceID: true
        filterBySpanID: false
      tracesToMetrics:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      search:
        hide: false
      lokiSearch:
        datasourceUid: loki

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      derivedFields:
        - name: trace_id
          # ortus logs are JSON: {... "trace_id":"<hex>" ...}
          matcherType: regex
          matcherRegex: '"trace_id":"(\w+)"'
          url: '${__value.raw}'
          datasourceUid: tempo
          urlDisplayLabel: 'View trace'
